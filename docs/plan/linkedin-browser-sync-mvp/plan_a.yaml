plan_id: linkedin-browser-sync-mvp
objective: >-
  Implementar um MVP de sincronizacao recorrente dos posts do proprio LinkedIn via navegador,
  com armazenamento local separado do historico de publicacao existente.
created_at: "2026-04-06T00:00:00Z"
created_by: GitHub Copilot GPT-5.4
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 4
  risk_score: medium

tldr: |
  O MVP deve aproveitar o padrao atual de config + CLI + persistencia local e introduzir
  um dominio separado de sync. A implementacao mais pratica e:
  1. persistir dados de sync em .local/linkedin/sync/ sem tocar no publish-history atual;
  2. usar Playwright com perfil persistente e login humano reutilizavel;
  3. descobrir posts na pagina de atividade/posts do proprio perfil e enriquecer cada item
     pela pagina de permalink;
  4. expor execucao unica e execucao recorrente via CLI, com lock para evitar sobreposicao.
open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Seletores da pagina de atividade ou do permalink mudam e a coleta quebra parcialmente.
      likelihood: high
      impact: high
      mitigation: Isolar extracao em adaptadores pequenos, validar com fixtures HTML reais e falhar com diagnostico claro por campo.
    - scenario: Sessao do LinkedIn expira durante execucoes recorrentes e o processo entra em falha repetitiva.
      likelihood: medium
      impact: high
      mitigation: Usar perfil persistente, detectar tela de login/checkpoint cedo e marcar state.json como reauth_required sem sobrescrever dados validos.
    - scenario: A mesma publicacao aparece com representacoes diferentes entre feed e permalink, gerando duplicidade ou merge incorreto.
      likelihood: medium
      impact: high
      mitigation: Canonicalizar por URL/permalink quando existir, manter chaves derivadas estaveis e registrar snapshots append-only antes de atualizar posts.json.
  assumptions:
    - O usuario aceita manter um perfil Chromium persistente local para reaproveitar login ativo.
    - O MVP pode depender de Chromium via Playwright em modo headed para o primeiro login e em modo headless ou headed nas sincronizacoes seguintes.
    - Campos nao visiveis em um post especifico podem ser gravados como null sem bloquear a sincronizacao.
    - A recorrencia inicial pode ser implementada como comando CLI de longa duracao, sem scheduler externo nem daemon de sistema.

implementation_specification:
  code_structure: >-
    Adicionar um dominio de sync separado do fluxo atual de publicacao: um modulo para storage,
    um modulo para sessao/browser, um modulo para coleta e enriquecimento, e um servico de
    orquestracao acionado pela CLI. Reutilizar o estilo atual de config centralizada, JSON local
    e respostas resumidas em JSON no terminal.
  affected_areas:
    - src/config.js
    - src/cli.js
    - src/local-state.js ou novo modulo dedicado de storage de sync
    - novos modulos src para browser session, collector e sync service
    - package.json
    - README.md
    - test/
    - .local/linkedin/sync/
  component_details:
    - component: SyncStore
      responsibility: Gerenciar posts.json, post-snapshots.jsonl e state.json de forma separada do historico de publicacao.
      interfaces:
        - loadSyncState() -> { lastRunAt, lastSuccessAt, cursor, lock, authState }
        - saveSyncState(state) -> state persistido
        - mergePosts(batch) -> resumo de insercoes, atualizacoes e duplicados
        - appendSnapshots(entries) -> quantidade gravada
    - component: BrowserSession
      responsibility: Abrir Chromium com perfil persistente, detectar necessidade de reauth e entregar Page/Context autenticados.
      interfaces:
        - openLinkedInSession({ headed }) -> { browser, context, page }
        - ensureAuthenticated(page) -> { authenticated, reason }
        - closeLinkedInSession() -> void
    - component: ProfilePostCollector
      responsibility: Navegar para a pagina de atividade/posts, coletar cards visiveis, abrir permalinks e normalizar os campos desejados.
      interfaces:
        - collectActivityPosts({ limit, since }) -> candidate posts
        - enrichPostFromPermalink(candidate) -> normalized post
        - normalizePost(raw) -> { canonicalUrl, text, publishedAt, media, metrics, postType }
    - component: SyncService
      responsibility: Orquestrar execucao unica e recorrente, aplicar lock, atualizar state e emitir resumo operacional para a CLI.
      interfaces:
        - runSyncOnce(options) -> { status, scanned, stored, updated, skipped, requiresReauth }
        - watchSync(options) -> stream de execucoes periodicas
        - listSyncedPosts(options) -> posts locais filtrados
  dependencies:
    - component: SyncService
      relationship: Usa BrowserSession para obter sessao autenticada e ProfilePostCollector para gerar lotes normalizados.
    - component: SyncService
      relationship: Usa SyncStore para deduplicar, persistir estado e registrar snapshots.
    - component: CLI
      relationship: Aciona SyncService e imprime JSON consistente com os demais comandos do projeto.
  integration_points:
    - Configuracao central em src/config.js para paths e defaults de sync.
    - Entrada CLI em src/cli.js com novos comandos sync.
    - Persistencia local em .local/linkedin/sync/ sem modificar publish-history.jsonl.
    - Suite de testes Node em test/ para store, normalizacao e fluxos de erro controlados.

contracts:
  - from_task: T1
    to_task: T3
    interface: Schema normalizado de post sincronizado e API de persistencia incremental.
    format: >-
      { postKey, canonicalUrl, text, publishedAt, postType, media[], metrics{}, source,
      firstSeenAt, lastSeenAt, lastSyncedAt, rawHints{} }
  - from_task: T2
    to_task: T3
    interface: Sessao autenticada do navegador e regras de deteccao de login/checkpoint.
    format: >-
      { context, page, profilePath, authenticated, requiresReauthReason }
  - from_task: T1
    to_task: T4
    interface: Estado operacional do sync e lock de execucao.
    format: >-
      { lastRunAt, lastSuccessAt, cursor, authState, activeLock, lastError }
  - from_task: T3
    to_task: T4
    interface: Resultado consolidado de uma rodada de sincronizacao.
    format: >-
      { status, scanned, enriched, stored, updated, skipped, requiresReauth, warnings[] }

