  - category: testing
    pattern: Core app em Node/Express com comportamento de automacao fora dos agentes markdown
    description: O comportamento verificavel do produto esta concentrado no codigo JS; os agentes funcionam como camada declarativa.
    examples:
      - file: src/cli.js
        location: src/cli.js:126
        snippet: "if (domain === \"sync\" && action === \"run\")"
      - file: src/local-state.js
        location: src/local-state.js:1
        snippet: "Persistencia de auth, drafts e sync store."
