patterns_found:
  - category: architecture
    pattern: Agentes especializados com orquestrador fino
    description: O repositorio usa um orquestrador que delega fases do fluxo em vez de concentrar logica num unico agente.
    examples:
      - file: .github/agents/linkedin-publishing-orchestrator.agent.md
        location: .github/agents/linkedin-publishing-orchestrator.agent.md:25
        snippet: "Phase 1..8 roteia interviewer, critic, voice, format, duplicate e draft manager."
      - file: AGENTS.md
        location: AGENTS.md:7
        snippet: "Tabela de agentes especialistas com responsabilidade unica."
    prevalence: common
  - category: structure
    pattern: Draft-first com two-step publish
    description: O fluxo operacional evita publicacao direta e usa prepare/confirm como barreira de seguranca.
    examples:
      - file: .github/agents/linkedin-draft-manager.agent.md
        location: .github/agents/linkedin-draft-manager.agent.md:23
        snippet: "Sempre seguir esta ordem exata... preparar... mostrar... solicitar confirmacao explicita."
      - file: src/app.js
        location: src/app.js:389
        snippet: "direct_publish_disabled"
    prevalence: common
  - category: error_handling
    pattern: Duplicidade operacional baseada em sync local
    description: A camada de aplicacao ja bloqueia duplicata exata e emite aviso de similaridade antes da publicacao.
    examples:
      - file: src/app.js
        location: src/app.js:86
        snippet: "findDuplicatePost(localState, content)"
      - file: src/app.js
        location: src/app.js:514
        snippet: "if (duplicateCheck.hasDuplicate && !allowDuplicate)"
    prevalence: common
  - category: naming
    pattern: Agentes e instrucoes nomeados pelo papel de negocio
    description: Os nomes dos agentes e instrucoes descrevem a funcao editorial/operacional, nao a tecnologia usada.
    examples:
      - file: .github/agents/linkedin-post-critic.agent.md
        location: .github/agents/linkedin-post-critic.agent.md:1
        snippet: "LinkedIn Post Critic"
      - file: .github/instructions/linkedin-editorial-guidelines.instructions.md
        location: .github/instructions/linkedin-editorial-guidelines.instructions.md:1
        snippet: "LinkedIn Editorial Guidelines"
    prevalence: common
  - category: documentation
    pattern: Regras editoriais e de voz codificadas em markdown, nao em validadores estruturados
    description: O julgamento editorial existe principalmente como texto instrucional; apenas duplicidade e formato tem ancoragem operacional mais forte.
    examples:
      - file: .github/agents/linkedin-voice-validator.agent.md
        location: .github/agents/linkedin-voice-validator.agent.md:13
        snippet: "Hard Rules"
      - file: .github/instructions/linkedin-editorial-guidelines.instructions.md
        location: .github/instructions/linkedin-editorial-guidelines.instructions.md:7
        snippet: "Every post should have one main idea..."
