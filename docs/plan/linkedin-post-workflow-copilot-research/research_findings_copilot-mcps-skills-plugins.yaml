plan_id: linkedin-post-workflow-copilot-research
objective: >-
  Pesquisar oportunidades para melhorar a criacao de posts de LinkedIn neste
  repositorio, com foco em MCPs, skills e plugins ja disponiveis ou facilmente
  integraveis no ambiente do GitHub Copilot e VS Code.
focus_area: copilot-mcps-skills-plugins
created_at: "2026-04-07T00:00:00Z"
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - O repositorio ja possui uma arquitetura madura de agentes para entrevista, critica editorial, voz, formato, duplicidade e operacao de publicacao.
  - O codigo operacional ja implementa bloqueio de duplicata exata e aviso por similaridade com base no sync local, entao a maior oportunidade nao e "mais um agente", e sim melhorar contexto estruturado e verificacao.
  - O ambiente do VS Code/Copilot ja suporta agentes customizados, handoffs, skills, plugins e MCP servers; isso reduz bastante o custo de adocao incremental.
  - Nao ha skills locais no repositorio nem MCP workspace dedicado ao dominio LinkedIn; as lacunas principais sao factual grounding, melhor uso do sync como contexto e menor dependencia de agentes externos nao versionados aqui.
  - MCPs e skills com melhor encaixe imediato: Doublecheck, browser/Playwright MCP, Context7, GitHub search/grep e handoffs mais fortes entre os agentes existentes.

research_metadata:
  methodology: >-
    Hybrid retrieval com leitura direta de arquivos do repositorio, grep para
    localizar contratos de duplicidade/publicacao, leitura de skills locais do
    ambiente do usuario e consulta a documentacao oficial do VS Code para
    custom agents, skills, plugins e MCP servers.
  scope: >-
    Fluxo de criacao, revisao, formato, duplicidade e publicacao; arquitetura de
    agentes do repo; ferramentas de customizacao e MCP do VS Code/Copilot; skills
    locais relevantes ao dominio editorial e operacional.
  confidence: high
  coverage: 88
  decision_blockers: 1
  research_blockers: 0

