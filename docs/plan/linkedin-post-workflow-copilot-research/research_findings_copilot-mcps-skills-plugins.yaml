related_conventions:
  naming_patterns_in_domain: >-
    Nomes guiados por responsabilidade de negocio, como Draft Manager, Post Critic,
    Voice Validator e Format Strategist.
  structure_of_domain: >-
    Instrucao declarativa em markdown para comportamento do agente e logica verificavel
    em JavaScript para auth, duplicidade, sync e publicacao.
  error_handling_in_domain: >-
    Bloqueios fortes para publish direto e duplicata exata; warnings para similaridade;
    reauth_required quando a autenticacao local expira ou fica invalida.
  testing_in_domain: >-
    O repositorio testa a camada Node; nao ha evidencias de testes automatizados para
    agentes markdown, instructions ou skills customizadas.
  documentation_in_domain: >-
    README, AGENTS.md e instructions descrevem workflow, limitacoes e heuristicas
    editoriais com bastante detalhe.

