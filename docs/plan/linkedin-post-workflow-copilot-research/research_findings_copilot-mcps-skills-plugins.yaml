    type: decision_blocker
    affects: [research]
  - question: O usuario aceita adicionar configuracao compartilhada de MCP em workspace, como .vscode/mcp.json, ou prefere manter tudo no perfil local?
    context: Isso altera o custo real de adocao e o compartilhamento da configuracao com o time.
    type: research
    affects: [research]
  - question: A checagem de duplicidade precisa evoluir de similaridade lexical para overlap tematico/hook com heuristica estruturada?
    context: O agente Duplicate Guard promete mais do que o codigo operacional hoje entrega.
    type: research
    affects: [research]

