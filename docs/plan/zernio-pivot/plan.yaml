  name: "Remoção de arquivos obsoletos"
  tasks:
    - task_id: "w1-t1"
      title: "Remover src/linkedin.js"
      agent: gem-implementer
      status: pending
      wave: 1
      dependencies: []
      task_definition:
        action: delete_file
        target: src/linkedin.js
        reason: "Zernio CLI substitui todas as chamadas à LinkedIn API (OAuth, posts, connections, mentions, image upload)"

    - task_id: "w1-t2"
      title: "Remover src/linkedin-sync.js"
      agent: gem-implementer
      status: pending
      wave: 1
      dependencies: []
      task_definition:
