        target: src/linkedin-sync.js
        reason: "Zernio analytics API substitui o scraper via Playwright"

    - task_id: "w1-t3"
      title: "Remover src/app.js"
      agent: gem-implementer
      status: pending
      wave: 1
      dependencies: []
      task_definition:
        action: delete_file
        target: src/app.js
        reason: "Express server não é mais necessário; CLI conversa diretamente com Zernio"

    - task_id: "w1-t4"
      title: "Remover src/server.js"
      agent: gem-implementer
      status: pending
      wave: 1
