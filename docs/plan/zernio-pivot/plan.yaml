        action: delete_file
        target: test/app.test.js
        reason: "Testes do Express server removido"

    - task_id: "w1-t6"
      title: "Remover test/linkedin-sync.test.js"
      agent: gem-implementer
      status: pending
      wave: 1
      dependencies: []
      task_definition:
        action: delete_file
        target: test/linkedin-sync.test.js
        reason: "Testes do scraper removido"

# ─────────────────────────────────────────────
# Wave 2 — Reescrita dos módulos core
# ─────────────────────────────────────────────
wave_2:
  name: "Reescrita dos módulos core"
  tasks:
    - task_id: "w2-t1"
      title: "Simplificar src/config.js"
      agent: gem-implementer
      status: pending
      wave: 2
      dependencies: ["w1-t1", "w1-t3", "w1-t4"]
      task_definition:
        action: rewrite_file
        target: src/config.js
        changes:
          remove:
            - "port, serverHost, appBaseUrl, authUrl"
            - "sessionSecret, linkedinClientId, linkedinClientSecret, linkedinRedirectUri"
            - "linkedinApiVersion, linkedinScopes, linkedinSyncStartUrl"
            - "browserProfileDirPath, syncDirPath, syncPostsFilePath, syncStateFilePath"
            - "connectionsFilePath, authFilePath"
          keep:
            - "dotenv config loading"
            - "localDataDir"
            - "draftsFilePath, draftsBackupFilePath"
            - "publishHistoryFilePath"
            - "publishIntentTtlMs"
          add:
            - "zernioAccountId: from env or hardcoded '69d527827dea335c2bc20f6f'"
            - "zernioApiKey: from env ZERNIO_API_KEY (optional, CLI uses ~/.zernio/config.json)"

    - task_id: "w2-t2"
      title: "Criar src/zernio.js"
      agent: gem-implementer
      status: pending
      wave: 2
      dependencies: ["w2-t1"]
      task_definition:
        action: create_file
        target: src/zernio.js
        description: >
          Módulo wrapper para Zernio CLI via child_process.execFile.
          Funções a implementar:
          - publishPost({ content, accountId, publishNow, firstComment, mentions, mediaItems }) — executa 'zernio post create'
          - getAnalytics({ accountId, fromDate, toDate, sortBy, limit }) — executa 'zernio analytics' ou HTTP GET /v1/analytics
          - resolveMention({ name, accountId }) — resolve URN de pessoa via Zernio
          Todas retornam Promise. Erros são wrappados com códigos claros.
        constraints:
          - "Usar child_process.execFile (não exec) para segurança"
          - "Zernio CLI é global, path descoberto via 'which zernio'"
          - "Mentions: mentionFormat deve ser embutido no content, array mentions é informacional"
          - "accountId default vem de config.js"

    - task_id: "w2-t3"
      title: "Limpar src/local-state.js"
      agent: gem-implementer
      status: pending
      wave: 2
      dependencies: ["w2-t1"]
      task_definition:
        action: edit_file
        target: src/local-state.js
        changes:
          remove:
            - "SyncStoreCorruptedError class"
            - "loadPersistedAuth, savePersistedAuth, invalidatePersistedAuth"
            - "loadSyncPostsStore, loadSyncState, saveSyncPostsStore, saveSyncState"
            - "loadConnections, saveConnections, findConnectionByName"
            - "ensureSyncDir"
            - "buildReauthState, normalizeUserSummary"
            - "SYNC_STORE_VERSION constant"
          keep:
            - "DraftStoreCorruptedError"
            - "DRAFT_STORE_VERSION"
            - "sortDraftsByUpdatedAt, normalizeOptionalString, isValidMentionUrn"
            - "normalizeMentions, normalizePostOptions"
            - "readUtf8File"
            - "createLocalState factory (simplified exports)"
            - "loadDraftStore, writeDraftStoreAtomically"
            - "listDrafts, getDraft, saveDraft, deleteDraft"
            - "appendHistoryEntry, listHistory"
            - "createPublishIntent, consumePublishIntent, purgeExpiredIntents"
          update_exports:
            - "Remove auth/sync/connections from returned object"

# ─────────────────────────────────────────────
# Wave 3 — Reescrita do CLI
# ─────────────────────────────────────────────
wave_3:
  name: "Reescrita do CLI"
  tasks:
    - task_id: "w3-t1"
      title: "Reescrever src/cli.js"
      agent: gem-implementer
      status: pending
      wave: 3
      dependencies: ["w2-t1", "w2-t2", "w2-t3"]
      task_definition:
        action: rewrite_file
        target: src/cli.js
        description: >
          CLI dispatcher que opera diretamente sobre local-state e zernio.js.
          Não faz HTTP requests. Não precisa de servidor rodando.
        commands:
          - "draft create --content='...' [--article-source=... --article-title=... --article-description=...] [--image-path=... --image-alt=...] [--mention-name=... --mention-urn=...]"
          - "draft list"
          - "draft show --draft-id=<uuid>"
          - "draft update --draft-id=<uuid> --content='...'"
          - "draft delete --draft-id=<uuid>"
          - "publish prepare --draft-id=<uuid>"
          - "publish confirm --confirmation-id=<uuid>"
          - "history list [--limit=N]"
          - "analytics [--from=YYYY-MM-DD] [--to=YYYY-MM-DD] [--sort-by=engagement]"
        behavior:
          draft_commands: "Operam diretamente em local-state (sem HTTP)"
          publish_prepare: "Cria publish intent em memória, mostra conteúdo para confirmação"
          publish_confirm: "Consome intent, chama zernio.publishPost(), salva no history, deleta draft"
          analytics: "Chama zernio.getAnalytics()"
          mentions: "Embute mentionFormat no content antes de passar para Zernio"

