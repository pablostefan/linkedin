plan_id: zernio-pivot
version: "1.0.0"
objective: >
  Pivotar o projeto LinkedIn de um pipeline Express + LinkedIn API para
  Zernio CLI como backend de publicação e analytics, mantendo os agentes
  de IA para composição de posts.
complexity: medium
status: pending_approval

plan_metrics:
  total_tasks: 16
  total_waves: 5
  wave_1_task_count: 6
  total_dependencies: 10
  risk_score: low

