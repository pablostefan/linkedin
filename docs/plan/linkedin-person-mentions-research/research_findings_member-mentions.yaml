plan_id: linkedin-person-mentions-research
objective: >-
  Pesquisar a viabilidade tecnica de adicionar suporte a mencoes de pessoas em
  posts do LinkedIn neste projeto, considerando a documentacao oficial do
  LinkedIn e o contexto atual do repositorio.
focus_area: member-mentions
created_at: "2026-04-07T00:00:00Z"
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - A documentacao oficial atual do LinkedIn para Posts API define commentary como little text e a migration guide afirma que o modelo legado de attributed text com attributes foi achatado para um unico campo string; nao encontrei evidencia atual de payload create com commentary.attributes/start/length/value.person no endpoint /rest/posts.
  - A sintaxe documental vigente para mencoes em posts e inline dentro de commentary, no formato little text, e a gramática oficial aceita MentionElement com Person URN ou Organization URN, por exemplo @[Nome](urn:li:person:1234).
  - A Posts API tambem afirma que commentary pode mencionar organizations ou members, mas os exemplos oficiais capturados mostram apenas organization mention; nao encontrei exemplo oficial atual de post pessoal com author=urn:li:person e commentary contendo member mention real.
  - O fluxo de publicacao self-serve do projeto ja cobre autor pessoa com w_member_social, mas o repositorio nao resolve person URN de terceiros, nao escapa little text e nao valida o match case-sensitive do nome exibido.
  - A conclusao pratica continua sendo que a sintaxe mais provavel e little text inline, mas a confirmacao de mencoes pessoais reais em feed exige experimento controlado com token e URN validos.

research_metadata:
  methodology: >-
    Pesquisa hibrida com leitura direta do repositorio, grep para contratos de
    payload e escopos, e consulta a documentacao oficial do LinkedIn via
    Microsoft Learn e LinkedIn Developers sobre Posts API, Post Schema, little
    text, People Typeahead e tiers/permissoes de Community Management API.
  scope: >-
    Fluxo de publicacao de posts pessoais deste repositorio, escopos OAuth,
    payload de criacao em /rest/posts, mencoes em commentary, descoberta de
    Person URN para mencao e restricoes de produto/permissao relevantes.
  confidence: medium
  coverage: 90
  decision_blockers: 1
  research_blockers: 0

