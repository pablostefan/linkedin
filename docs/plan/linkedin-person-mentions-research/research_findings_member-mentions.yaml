open_questions:
  - question: >-
      Um post pessoal criado com w_member_social e commentary contendo
      @[Nome](urn:li:person:...) converte a mencao em link real no feed sem usar
      People Typeahead?
    context: >-
      A Posts API e little text dizem que members podem ser mencionados em
      commentary, mas os exemplos oficiais capturados mostram somente organization
      mention e a documentacao de descoberta de membros para mencao e centrada em
      paginas de organizacao e followers.
    type: decision_blocker
    affects:
      - mentions-personal-posts
  - question: >-
      Existe algum endpoint self-serve documentado para resolver person URN de
      terceiros em contexto de perfil pessoal, sem r_organization_followers?
    context: >-
      A documentacao capturada nao apresenta fluxo equivalente ao People
      Typeahead para membros autenticados publicando no proprio perfil.
    type: research
    affects:
      - mentions-personal-posts
  - question: >-
      A API aceita member mention por vanity URL previamente conhecida ou exige
      obrigatoriamente person URN exata do terceiro?
    context: >-
      little text e Posts API mostram sintaxe com URN, mas nao documentam atalho
      self-serve para perfil pessoal converter vanity URL em person URN.
    type: research
    affects:
      - mentions-personal-posts

gaps:
  - area: Fluxo oficial self-serve para descoberta de pessoa mencionavel em post pessoal
    description: >-
      A documentacao oficial coletada descreve member mention em commentary, mas
      nao fecha ponta a ponta como um app de perfil pessoal, em tier self-serve,
      obtém com legitimidade a person URN do terceiro a ser mencionado.
    impact: decision_blocker
    affects:
      - mentions-personal-posts
  - area: Comportamento real de rendering/link conversion para member mention em author person
    description: >-
      Nao ha exemplo oficial capturado de create post com author=urn:li:person e
      commentary contendo @[Pessoa](urn:li:person:...), nem evidencia documental
      atual de acceptance explicita do formato legado commentary + attributes no
      endpoint /rest/posts.
    impact: research_blocker
    affects:
      - mentions-personal-posts
  - area: Tratamento de little text no repositorio
    description: >-
      O projeto nao possui escape de caracteres reservados, validacao de nomes
      case sensitive, lookup de third-party person URN nem testes dedicados a
      mention payloads.
    impact: nice_to_know
    affects:
      - mentions-personal-posts