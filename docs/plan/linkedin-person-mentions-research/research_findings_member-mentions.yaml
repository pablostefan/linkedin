domain_security_considerations:
  sensitive_areas:
    - area: Descoberta e uso de member data para mencoes
      location: People Typeahead API and restricted-use documentation
      concern: Dados de membros possuem restricoes de uso, exibicao e retencao; fluxo de mencoes nao pode virar base local de perfis.
    - area: Persistencia local de auth
      location: /Users/pablostefan/GitHub/linkedin/.local/linkedin/auth.json
      concern: O token autenticado para postar em nome do membro precisa manter escopo minimo e tratamento de invalidacao.
  authentication_patterns_in_domain: >-
    OAuth 2.0 com OpenID Connect e token de membro persistido localmente; o
    projeto ja opera com w_member_social para escrita em perfil pessoal.
  authorization_patterns_in_domain: >-
    Escopos sao a principal fronteira de autorizacao; para mencoes de pessoas a
    documentacao oficial relevante acrescenta r_organization_followers no fluxo de
    descoberta, o que nao se aplica ao setup atual de perfil pessoal.
  data_validation_in_domain: >-
    O projeto valida formato de draft e midia, mas nao valida little text,
    caracteres reservados nem aderencia do texto ao nome exato exigido para a
    conversao da mencao em link.

