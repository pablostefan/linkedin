patterns_found:
  - category: architecture
    pattern: Publicacao pessoal usa author Person URN obtido do proprio login OAuth.
    description: O projeto foi desenhado para postar no perfil autenticado usando w_member_social e urn:li:person do proprio usuario.
    examples:
      - file: src/linkedin.js
        location: src/linkedin.js:68
        snippet: "return `urn:li:person:${userInfo.sub}`;"
      - file: src/linkedin.js
        location: src/linkedin.js:176
        snippet: 'author: authorUrn, commentary: content'
    prevalence: common
  - category: structure
    pattern: O payload de criacao do post espelha quase literalmente o schema minimo da Posts API.
    description: O projeto usa commentary em texto direto e nao modela attributes, entity ranges ou metadados de mention em estrutura separada.
    examples:
      - file: src/linkedin.js
        location: src/linkedin.js:174
        snippet: 'const body = { author: authorUrn, commentary: content, visibility, distribution: { feedDistribution: "MAIN_FEED", targetEntities: [], thirdPartyDistributionChannels: [] }, lifecycleState: "PUBLISHED", isReshareDisabledByAuthor: false };'
    prevalence: common
  - category: naming
    pattern: Escopos do LinkedIn sao controlados centralmente em configuracao e README.
    description: O repositorio deixa explicito quando um fluxo depende de permissao restrita, como r_member_social, e nao presume liberacao automatica.
    examples:
      - file: src/config.js
        location: src/config.js:31
        snippet: 'linkedinScopes: (process.env.LINKEDIN_SCOPES || "openid profile email w_member_social")'
      - file: README.md
        location: README.md:33
        snippet: 'Voce precisa que o LinkedIn aprove o escopo restrito r_member_social para a sua app.'
    prevalence: common
  - category: architecture
    pattern: Nao ha mecanismo interno para descobrir ou validar Person URN de terceiros antes da publicacao.
    description: O projeto nao integra busca de pessoas, lookup de vanity URL ou qualquer etapa preparatoria para mencoes reais.
    examples:
      - file: src/linkedin.js
        location: src/linkedin.js:1
        snippet: 'Modulo contem auth, posts e upload de imagem, sem endpoint auxiliar de lookup de membros.'
      - file: src/app.js
        location: src/app.js:548
        snippet: 'publish confirm envia intent.content diretamente para createPost.'
    prevalence: common

