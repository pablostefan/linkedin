related_conventions:
  naming_patterns_in_domain: >-
    Uso consistente de personUrn, authorUrn, postOptions e linkedinScopes para
    refletir nomenclatura oficial da API.
  structure_of_domain: >-
    O repositorio separa configuracao, adaptador LinkedIn e orquestracao HTTP
    local; drafts e historico ficam fora do adaptador remoto.
  error_handling_in_domain: >-
    Erros HTTP do LinkedIn sao propagados com status/payload; 401 invalida auth
    persistida; nao ha erros especificos para falha de resolucao de mencoes porque
    esse fluxo nao existe.
  testing_in_domain: >-
    Ha testes para auth/publicacao geral, mas nao existe cobertura dedicada a
    little text, mention escaping ou resolucao de Person URN.
  documentation_in_domain: >-
    README e instrucoes do workspace documentam claramente a diferenca entre
    permissoes basicas de escrita e permissoes restritas de leitura.

