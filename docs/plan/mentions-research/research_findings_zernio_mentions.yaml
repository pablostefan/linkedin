plan_id: mentions-research
objective: Investigate how the Zernio CLI handles LinkedIn mentions when creating posts
focus_area: zernio-mentions-integration
created_at: "2026-04-07T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Zernio CLI `posts:create` has NO `--mentions` flag. The only parameters are `--text`, `--accounts`, `--media`, `--tags`, `--hashtags`, `--scheduledAt`, `--timezone`, `--draft`, `--title`.
  - The project already has mention resolution infrastructure (`resolveMention` → Zernio HTTP API → returns `urn` + `mentionFormat`), and `local-state.js` validates/stores mentions in drafts. But `publishPost()` in `zernio.js` NEVER passes mention data to the CLI — it's completely dropped at the publication boundary.
  - Repository memory confirms a previously successful mention publish (urn:li:share:7447313181821190144) using `mentionFormat` embedded in content. However, that success was likely via Zernio web UI or direct API, NOT via this CLI workflow.
  - The root gap: `publishPost()` builds CLI args with `--text` (content) but does NOT pass structured mention objects. The Zernio CLI may require a `--mentions` JSON parameter, or the Zernio HTTP API (not CLI) may be needed for mention-aware publishing.

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search, file reads, terminal CLI --help inspection, repository memory consultation"
  scope: "Full analysis of src/zernio.js, src/cli.js, src/local-state.js, test/zernio.test.js, Zernio CLI help output, ~/.zernio/config.json"
  confidence: high
  coverage: 95
  decision_blockers: 1
  research_blockers: 0

files_analyzed:
  - file: zernio.js
    path: src/zernio.js
    purpose: "Wraps Zernio CLI and HTTP API calls for publishing, analytics, and mention resolution"
    key_elements:
      - element: runZernio
        type: function
        location: "src/zernio.js:6"
        description: "Generic CLI runner: spawns `npx zernio <args>`, parses JSON stdout"
      - element: publishPost
        type: function
        location: "src/zernio.js:87"
        description: |
          Builds `posts:create` CLI args. Accepts `content`, `accountId`, `options`.
          Passes: --text, --accounts, --draft, --scheduledAt, --timezone, --hashtags, --tags, --media.
          DOES NOT pass any mention data. The `options` object has no mention handling.
      - element: runZernioMentionResolve
        type: function
        location: "src/zernio.js:48"
        description: |
          Direct HTTP call to Zernio API: GET /v1/accounts/{accountId}/linkedin-mentions?url=<url>&displayName=<name>.
          Returns { urn, mentionFormat }. NOT a CLI call — uses fetch() directly with Bearer auth.
      - element: resolveMention
        type: function
        location: "src/zernio.js:139"
        description: "Public wrapper: resolves API key, then calls runZernioMentionResolve"
    language: javascript
    lines: 149

  - file: cli.js
    path: src/cli.js
    purpose: "CLI entry point for all local commands (draft, publish, mention, analytics)"
    key_elements:
      - element: "publish confirm handler"
        type: pattern
        location: "src/cli.js:225-272"
        description: |
          Consumes publish intent, builds publishOptions. Passes image paths and article source.
          CRITICALLY: does NOT extract mentions from intent.postOptions.mentions to pass to publishPost().
          The mentions data exists in the draft/intent but is silently ignored at publish time.
      - element: "mention resolve handler"
        type: pattern
        location: "src/cli.js:289-298"
        description: "CLI `mention resolve` command: calls resolveMention() with --url and --display-name flags"
    language: javascript
    lines: 307

  - file: local-state.js
    path: src/local-state.js
    purpose: "Manages local draft storage, publish intents, and history"
    key_elements:
      - element: normalizeMentions
        type: function
        location: "src/local-state.js:41"
        description: |
          Validates mention objects: requires { type: 'person', name: string, urn: string }.
          Validates URN format against regex: /^urn:li:(?:person|member):[A-Za-z0-9_-]+$/.
          Properly stores mentions inside postOptions when saving drafts.
      - element: normalizePostOptions
        type: function
        location: "src/local-state.js:87"
        description: "Normalizes article, image, AND mentions in postOptions. Mentions are preserved in draft payload."
    language: javascript
    lines: 140

  - file: zernio.test.js
    path: test/zernio.test.js
    purpose: "Unit tests for Zernio wrapper functions"
    key_elements:
      - element: "resolveMention test"
        type: pattern
        location: "test/zernio.test.js:215-247"
        description: |
          Confirms resolveMention returns { urn: 'urn:li:person:abc', mentionFormat: '@[Someone Name](urn:li:person:abc)' }.
          The mentionFormat is the LinkedIn little text format to embed in content.
      - element: "publishPost tests"
        type: pattern
        location: "test/zernio.test.js:62-170"
        description: "Tests confirm publishPost never includes --mentions, --publish-now, --organization-urn, --first-comment, --disable-link-preview"
    language: javascript
    lines: 252

patterns_found:
  - category: architecture
    pattern: "Mention data pipeline broken at publish boundary"
    description: |
      The project has a complete mention resolution and storage pipeline:
      1. `mention resolve` → resolves URL to { urn, mentionFormat }
      2. `local-state.js` → validates and stores mentions in draft postOptions
      3. BUT `publishPost()` → completely ignores mentions when building CLI args
      The data exists in the draft but is never forwarded to Zernio.
    examples:
      - file: src/zernio.js
        location: "src/zernio.js:87-109"
        snippet: |
          # publishPost builds args but has NO mention handling:
          const args = ["posts:create", "--text", content, "--accounts", accountId];
          # ...handles isDraft, scheduledFor, timezone, hashtags, tags, imagePaths
          # MISSING: no mention-related args
      - file: src/cli.js
        location: "src/cli.js:234-253"
        snippet: |
          # publish confirm builds publishOptions but ignores mentions:
          if (intent.postOptions?.image?.path) { publishOptions.imagePaths = [...] }
          if (intent.postOptions?.article?.source) { publishOptions.firstComment = ... }
          # MISSING: no mention extraction from intent.postOptions.mentions
    prevalence: common

  - category: architecture
    pattern: "Zernio CLI has no --mentions flag"
    description: |
      The `npx zernio posts:create --help` output shows NO mention-related parameter.
      Available flags: --text, --accounts, --scheduledAt, --draft, --media, --title, --tags, --hashtags, --timezone.
      This means even if publishPost() tried to pass mentions, there's no CLI flag for it.
    examples:
      - file: "(terminal output)"
        location: "npx zernio posts:create --help"
        snippet: "Options: --text, --accounts, --scheduledAt, --draft, --media, --title, --tags, --hashtags, --timezone"
    prevalence: common

  - category: architecture
    pattern: "Mention resolution uses direct HTTP, not CLI"
    description: |
      resolveMention() bypasses the CLI entirely: it calls fetch() to the Zernio REST API directly.
      This establishes a pattern where the CLI may not support all features available in the Zernio HTTP API.
    examples:
      - file: src/zernio.js
        location: "src/zernio.js:48-84"
        snippet: "const endpoint = new URL(`https://zernio.com/api/v1/accounts/${accountId}/linkedin-mentions`);"
    prevalence: occasional

