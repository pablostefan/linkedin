assessment: |
  ## Root Cause
  The Zernio CLI `posts:create` command has **no `--mentions` flag**. The `publishPost()` function
  in `zernio.js` doesn't pass any mention data, and the CLI wouldn't accept it even if it did.

  ## What Already Works
  - Mention resolution via Zernio HTTP API (returns urn + mentionFormat)
  - Local draft storage with validated mention objects
  - The mentionFormat `@[Name](urn:li:person:xxx)` syntax itself

  ## What's Broken
  At the `publishPost()` boundary, mentions are completely dropped. The content text with embedded
  `@[Name](urn:li:person:xxx)` is passed as `--text`, but without corresponding structured mention
  metadata, the Zernio backend sends it as plain text to LinkedIn. LinkedIn's API requires
  **both** the annotation syntax in the text AND structured mention objects in the API payload.

  ## Recommended Approaches (in priority order)

  ### 1. Use Zernio HTTP API directly for mention-aware posts (MOST PROMISING)
  Since `resolveMention()` already calls the Zernio HTTP API directly (bypassing CLI), the same
  pattern could be used for post creation. Check if Zernio's REST API has a
  `POST /v1/accounts/{id}/posts` endpoint that accepts a `mentions` array alongside the text.
  This would require a new `publishPostViaApi()` function in `zernio.js`.

  ### 2. Check for undocumented Zernio CLI flags
  Run `npx zernio posts:create --mentions '[{"urn":"...","name":"..."}]' --text "..."` to test
  if an undocumented `--mentions` flag exists. CLI help may not show all available options.

  ### 3. Contact Zernio support / check Zernio API docs
  The Zernio platform may have documentation for mention-aware post creation that isn't
  exposed through the CLI.

  ### 4. Wire mentions through the existing pipeline
  Even without a CLI flag, ensure `cli.js` (publish:confirm) extracts mentions from
  `intent.postOptions.mentions` and passes them to `publishPost()` — so when a mention
  solution is found, the data pipeline is ready.
